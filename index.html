<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay AR Campaign</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

video, #ar-section {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

#overlay {
  position:absolute;
  width:160px;
  filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.4));
}

.controls {
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
}

#modeSwitch {
  position:absolute;
  top:10px;
  left:10px;
}
</style>
</head>

<body>

<!-- MODE SWITCH -->
<button id="modeSwitch" onclick="switchMode()">Switch Mode</button>

<!-- SELFIE MODE -->
<video id="video" autoplay playsinline></video>
<img id="overlay" src="vijay.png">

<!-- AR MODE -->
<div id="ar-section" style="display:none;">
  <a-scene embedded webxr="requiredFeatures: hit-test">
    <a-camera></a-camera>

    <a-entity id="model"
      gltf-model="tvk_thalapathi_vijay.glb"
      visible="false"
      scale="0.3 0.3 0.3">
    </a-entity>
  </a-scene>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="capture()">📸 Capture</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let mode = "selfie";
let video = document.getElementById('video');
let overlay = document.getElementById('overlay');

// CAMERA START
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// =======================
// FACE DETECTION
// =======================
const faceDetection = new FaceDetection({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
});

faceDetection.setOptions({
  model: 'short',
  minDetectionConfidence: 0.6
});

faceDetection.onResults(results => {
  if (mode !== "selfie") return;

  if (results.detections.length > 0) {
    const face = results.detections[0].boundingBox;

    const x = face.xCenter * window.innerWidth;
    const y = face.yCenter * window.innerHeight;

    overlay.style.left = (x + 80) + "px";
    overlay.style.top = (y - 60) + "px";
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await faceDetection.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

// =======================
// MODE SWITCH
// =======================
function switchMode() {
  mode = (mode === "selfie") ? "ar" : "selfie";

  document.getElementById('video').style.display = (mode==="selfie")?"block":"none";
  document.getElementById('overlay').style.display = (mode==="selfie")?"block":"none";
  document.getElementById('ar-section').style.display = (mode==="ar")?"block":"none";
}

// =======================
// AR TAP TO PLACE
// =======================
document.body.addEventListener("click", () => {
  if (mode !== "ar") return;

  const model = document.getElementById("model");
  model.setAttribute("visible", true);
  model.setAttribute("position", "0 0 -1");
});

// =======================
// CAPTURE
// =======================
function capture() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  if (mode === "selfie") {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const rect = overlay.getBoundingClientRect();
    ctx.drawImage(overlay, rect.left, rect.top, rect.width, rect.height);
  }

  // Download + Share
  canvas.toBlob(blob => {
    const file = new File([blob], "vijay.png", { type: "image/png" });

    if (navigator.share) {
      navigator.share({
        title: "I Support Vijay 🔥",
        files: [file]
      });
    } else {
      const link = document.createElement('a');
      link.download = "vijay.png";
      link.href = canvas.toDataURL();
      link.click();
    }
  });
}
</script>

</body>
</html>
