<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay AR Standing</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body { margin:0; overflow:hidden; }

video, canvas {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

button {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  z-index:10;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<!-- A-Frame Scene -->
<a-scene embedded>
  <a-entity camera position="0 0 0"></a-entity>

  <a-entity 
    id="vijayModel"
    gltf-model="tvk_thalapathi_vijay.glb"
    scale="0.5 0.5 0.5"
    position="0 0 -2">
  </a-entity>
</a-scene>

<button onclick="capture()">📸 Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const model = document.getElementById("vijayModel");

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// FACE DETECTION
const faceDetection = new FaceDetection({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
});

faceDetection.setOptions({
  model: "short",
  minDetectionConfidence: 0.6
});

// UPDATE MODEL POSITION
faceDetection.onResults(results => {
  if (results.detections.length > 0) {

    const face = results.detections[0].boundingBox;

    // Convert face position to 3D offset
    let x = (face.xCenter - 0.5) * 2;
    let y = (0.5 - face.yCenter) * 2;

    // Place model beside user
    model.object3D.position.set(x + 1.2, y - 1, -3);
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await faceDetection.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

// CAPTURE FUNCTION
function capture() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Draw camera
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Draw 3D scene
  const scene = document.querySelector("a-scene canvas");
  if (scene) {
    ctx.drawImage(scene, 0, 0, canvas.width, canvas.height);
  }

  const link = document.createElement("a");
  link.download = "vijay-ar.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
