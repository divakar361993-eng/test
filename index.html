<!DOCTYPE html>
<html lang="ta">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>TVK AR Campaign – Thalapathi Vijay</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tiro+Tamil:ital@0;1&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --tvk-red: #CC0000;
    --tvk-gold: #FFD700;
  }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Oswald', sans-serif;
    width: 100vw; height: 100vh;
    position: relative;
  }

  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 1;
    display: none;
  }

  #arCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  #scanLines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    z-index: 3; pointer-events: none;
  }

  #hud { position: absolute; inset: 0; z-index: 4; pointer-events: none; }

  .hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 16px 8px;
    background: linear-gradient(180deg, rgba(180,0,0,0.92) 0%, transparent 100%);
    display: flex; align-items: center; justify-content: space-between;
  }
  .tvk-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    letter-spacing: 4px; color: var(--tvk-gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.6), 2px 2px 4px rgba(0,0,0,0.8);
  }
  .tvk-logo-text span { color: #fff; }
  .hud-top-right { text-align: right; }
  .tagline {
    font-family: 'Tiro Tamil', serif;
    font-size: clamp(10px, 2.5vw, 14px);
    color: rgba(255,255,255,0.92);
    text-shadow: 1px 1px 3px #000;
    display: block; line-height: 1.4;
  }

  .corner { position: absolute; width: 40px; height: 40px; z-index: 4; pointer-events: none; }
  .corner-tl { top: 64px; left: 12px; border-top: 3px solid var(--tvk-red); border-left: 3px solid var(--tvk-red); }
  .corner-tr { top: 64px; right: 12px; border-top: 3px solid var(--tvk-red); border-right: 3px solid var(--tvk-red); }
  .corner-bl { bottom: 100px; left: 12px; border-bottom: 3px solid var(--tvk-red); border-left: 3px solid var(--tvk-red); }
  .corner-br { bottom: 100px; right: 12px; border-bottom: 3px solid var(--tvk-red); border-right: 3px solid var(--tvk-red); }

  .hud-slogan {
    position: absolute; bottom: 92px; left: 0; right: 0;
    background: linear-gradient(90deg, transparent, rgba(180,0,0,0.85) 10%, rgba(180,0,0,0.85) 90%, transparent);
    padding: 6px 20px; overflow: hidden;
  }
  .slogan-track { display: flex; gap: 60px; animation: ticker 18s linear infinite; white-space: nowrap; }
  .slogan-item {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 3.5vw, 22px);
    letter-spacing: 2px; color: var(--tvk-gold);
    text-shadow: 1px 1px 0 #000; flex-shrink: 0;
  }
  .slogan-item .sep { color: rgba(255,255,255,0.4); margin: 0 8px; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  #faceStatus {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,215,0,0.4);
    border-radius: 20px; padding: 4px 14px;
    font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.7);
    z-index: 5; pointer-events: none;
  }
  #faceStatus.detected { border-color: #00ff88; color: #00ff88; }

  #sloganOverlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; z-index: 4; pointer-events: none; opacity: 0;
  }
  #sloganOverlay.show { animation: sloganPop 2.5s ease forwards; }
  @keyframes sloganPop {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(0.7); }
    15% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    75% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1); }
  }
  .slogan-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 56px); letter-spacing: 4px; color: var(--tvk-gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 3px 3px 0 rgba(180,0,0,0.8), 6px 6px 0 rgba(0,0,0,0.5);
    line-height: 1.1; padding: 0 20px;
  }
  .slogan-tamil {
    font-family: 'Tiro Tamil', serif;
    font-size: clamp(14px, 3.5vw, 22px); color: rgba(255,255,255,0.9);
    text-shadow: 1px 1px 4px #000, 0 0 12px rgba(255,215,0,0.4); margin-top: 4px;
  }

  #recIndicator {
    position: absolute; top: 70px; right: 14px;
    display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.65); border: 1px solid #ff3333;
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; letter-spacing: 1px; color: #ff4444;
    z-index: 5; pointer-events: none;
  }
  #recIndicator.active { display: flex; }
  #recDot {
    width: 8px; height: 8px; border-radius: 50%; background: #ff3333;
    animation: blink 1s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #flash {
    position: absolute; inset: 0; background: white;
    z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.05s;
  }
  #flash.active { opacity: 0.85; }

  #toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.85); border: 1px solid var(--tvk-gold);
    border-radius: 12px; padding: 14px 24px;
    color: var(--tvk-gold); font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 6;
    background: linear-gradient(0deg, rgba(10,0,0,0.95) 60%, transparent 100%);
    padding: 12px 20px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .ctrl-btn {
    border: none; border-radius: 50px; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15); min-width: 58px;
  }
  .ctrl-btn.rec-active { border-color: #ff3333 !important; color: #ff4444 !important; background: rgba(255,0,0,0.15) !important; }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn .icon { font-size: 20px; }

  #captureBtn {
    width: 68px; height: 68px; border-radius: 50%;
    border: 3px solid var(--tvk-gold);
    background: radial-gradient(circle at 40% 35%, #ff3333, var(--tvk-red));
    box-shadow: 0 0 20px rgba(204,0,0,0.6), 0 0 40px rgba(204,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.2s; position: relative; flex-shrink: 0;
  }
  #captureBtn::after {
    content:''; position:absolute; inset:5px;
    border-radius:50%; border:2px solid rgba(255,255,255,0.3);
  }
  #captureBtn:active { transform: scale(0.88); }

  /* SPLASH */
  #splash {
    position: absolute; inset: 0; z-index: 30;
    background: radial-gradient(ellipse at center, #300000 0%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    transition: opacity 0.6s;
  }
  #splash h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 10vw, 68px); letter-spacing: 6px;
    color: var(--tvk-gold);
    text-shadow: 0 0 40px rgba(255,215,0,0.5), 3px 3px 0 #660000;
    text-align: center; line-height: 1;
  }
  #splash p {
    font-family: 'Tiro Tamil', serif;
    font-size: clamp(14px, 4vw, 22px); color: rgba(255,255,255,0.8); text-align: center;
  }
  #startBtn {
    background: linear-gradient(135deg, #CC0000, #880000);
    border: 2px solid var(--tvk-gold); border-radius: 50px;
    padding: 14px 44px; color: var(--tvk-gold);
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px;
    cursor: pointer; box-shadow: 0 0 24px rgba(204,0,0,0.55);
    transition: transform 0.2s;
  }
  #startBtn:active { transform: scale(0.94); }
  .splash-sub {
    font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,215,0,0.5); text-align: center;
  }
</style>
</head>
<body>

<!-- INTRO SPLASH -->
<div id="splash">
  <h1>TVK<br><span style="color:#fff;font-size:0.52em;letter-spacing:3px">AR CAMPAIGN</span></h1>
  <p>தமிழக வெற்றிக் கழகம்<br><span style="font-family:Oswald;font-size:0.7em;letter-spacing:2px;opacity:0.7">TAMILAGA VETTRI KAZHAGAM</span></p>
  <button id="startBtn" onclick="startApp()">▶ தொடங்கு / START</button>
  <div class="splash-sub">CAMERA + AUDIO PERMISSION REQUIRED</div>
</div>

<!-- HIDDEN VIDEO (camera source) -->
<video id="video" autoplay playsinline muted></video>

<!-- SCAN LINES -->
<div id="scanLines"></div>

<!-- MAIN AR CANVAS -->
<canvas id="arCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div class="tvk-logo-text">TVK <span>✦</span> Campaign</div>
    <div class="hud-top-right">
      <span class="tagline">தமிழக வெற்றிக் கழகம்</span>
      <span class="tagline" style="font-family:'Oswald';font-size:10px;opacity:0.7;letter-spacing:1px;">TAMILAGA VETTRI KAZHAGAM</span>
    </div>
  </div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="hud-slogan">
    <div class="slogan-track" id="sloganTrack"></div>
  </div>
</div>

<!-- FACE STATUS -->
<div id="faceStatus">LOOKING FOR FACE…</div>

<!-- REC INDICATOR -->
<div id="recIndicator"><div id="recDot"></div>&nbsp;REC</div>

<!-- SLOGAN POPUP -->
<div id="sloganOverlay">
  <div class="slogan-big"  id="sloganBig">MAKKAL MUDHAL</div>
  <div class="slogan-tamil" id="sloganTamil">மக்களே முதல்</div>
</div>

<!-- FLASH -->
<div id="flash"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrl-btn" onclick="cycleSloganOverlay()">
    <span class="icon">🎤</span>
    <span>SLOGAN</span>
  </button>

  <button id="captureBtn" onclick="capturePhoto()" title="Capture Photo"></button>

  <button class="ctrl-btn" id="recBtn" onclick="toggleRecording()">
    <span class="icon" id="recIcon">🎥</span>
    <span id="recLabel">RECORD</span>
  </button>
</div>

<!-- HIDDEN CAPTURE CANVAS -->
<canvas id="captureCanvas" style="display:none"></canvas>

<!-- TVK SONG (auto-play on start) -->
<audio id="bgAudio" src="tvksong.mp3" loop preload="auto"></audio>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const SLOGANS = [
  { en: "MAKKAL MUDHAL",        ta: "மக்களே முதல்" },
  { en: "NAMMA THALAPATHI",     ta: "நம்ம தலபதி" },
  { en: "TVK – THE PEOPLE",     ta: "TVK – மக்கள் கட்சி" },
  { en: "NEW DAWN BEGINS",      ta: "புதிய விடியல்" },
  { en: "TRUTH & VICTORY",      ta: "உண்மை • வெற்றி" },
  { en: "VIJAY FOR TAMIL NADU", ta: "விஜய் தமிழகத்திற்காக" },
];
const TICKER = [
  "✦ MAKKAL MUDHAL ✦","நம்ம தலபதி",
  "✦ TAMILAGA VETTRI KAZHAGAM ✦","புதிய விடியல்",
  "✦ TVK WITH THE PEOPLE ✦","விஜய் நம் வழிகாட்டி",
  "✦ TRUTH & VICTORY ✦","TVK – மக்கள் கட்சி",
];
let sloganIdx = 0, lastBlob = null, appStarted = false;

// ═══════════════════════════════════
// TICKER
// ═══════════════════════════════════
(function() {
  const t = document.getElementById('sloganTrack');
  const f = [...TICKER,...TICKER];
  t.innerHTML = f.map(s=>`<span class="slogan-item">${s}<span class="sep">|</span></span>`).join('');
})();

// ═══════════════════════════════════
// VIJAY IMAGE
// ═══════════════════════════════════
const vijayImg = new Image();
vijayImg.src = 'vijay.png';
vijayImg.onload  = () => showToast('✦ THALAPATHI READY ✦');
vijayImg.onerror = () => showToast('⚠ vijay.png NOT FOUND');

// Smoothed position (normalized)
let vPos   = { x: 0.72, y: 0.15, w: 200 };
let vTarget= { x: 0.72, y: 0.15, w: 200 };

// ═══════════════════════════════════
// CANVAS
// ═══════════════════════════════════
const video    = document.getElementById('video');
const arCanvas = document.getElementById('arCanvas');
const ctx      = arCanvas.getContext('2d');

function resize() {
  arCanvas.width  = window.innerWidth;
  arCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════
function renderLoop() {
  const W = arCanvas.width, H = arCanvas.height;
  ctx.clearRect(0, 0, W, H);

  // 1 — Camera (mirrored)
  ctx.save();
  ctx.translate(W, 0); ctx.scale(-1, 1);
  if (video.readyState >= 2) ctx.drawImage(video, 0, 0, W, H);
  ctx.restore();

  // 2 — Smooth lerp vijay pos
  vPos.x += (vTarget.x - vPos.x) * 0.1;
  vPos.y += (vTarget.y - vPos.y) * 0.1;
  vPos.w += (vTarget.w - vPos.w) * 0.1;

  // 3 — Draw Vijay PNG
  if (vijayImg.complete && vijayImg.naturalWidth > 0) {
    const iw = vPos.w;
    const ih = vijayImg.naturalHeight * (iw / vijayImg.naturalWidth);
    const ix = vPos.x;
    const iy = vPos.y;

    // Red glow beneath image
    ctx.save();
    ctx.shadowBlur = 45; ctx.shadowColor = 'rgba(204,0,0,0.65)';
    ctx.drawImage(vijayImg, ix, iy, iw, ih);
    ctx.restore();

    // Ground glow ellipse
    const gx = ix + iw/2, gy = iy + ih;
    const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, iw * 0.55);
    gr.addColorStop(0, 'rgba(204,0,0,0.35)'); gr.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.ellipse(gx, gy, iw*0.55, iw*0.1, 0, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
  }

  // 4 — Face box
  if (faceBox) drawFaceFrame(W, H);

  requestAnimationFrame(renderLoop);
}

// ═══════════════════════════════════
// FACE DETECTION
// ═══════════════════════════════════
let faceBox = null;

const fd = new FaceDetection({
  locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`
});
fd.setOptions({ model:'short', minDetectionConfidence:0.55 });
fd.onResults(results => {
  if (results.detections && results.detections.length > 0) {
    faceBox = results.detections[0].boundingBox;
    document.getElementById('faceStatus').textContent = '✦ FACE DETECTED – READY';
    document.getElementById('faceStatus').classList.add('detected');

    // Position Vijay beside face
    const W = arCanvas.width, H = arCanvas.height;
    const fsx = (1 - faceBox.xCenter) * W;   // screen X (mirror corrected)
    const fsy = faceBox.yCenter * H;
    const fw  = faceBox.width  * W;

    vTarget.w = fw * 1.7;
    vTarget.x = fsx + fw * 0.6;
    vTarget.y = fsy - vTarget.w * 0.45;
  } else {
    faceBox = null;
    document.getElementById('faceStatus').textContent = 'LOOKING FOR FACE…';
    document.getElementById('faceStatus').classList.remove('detected');
  }
});

function drawFaceFrame(W, H) {
  const bx = (1 - faceBox.xCenter - faceBox.width/2)  * W;
  const by = (faceBox.yCenter - faceBox.height/2) * H;
  const bw = faceBox.width  * W;
  const bh = faceBox.height * H;
  const px = 12, py = 12;

  ctx.save();
  ctx.shadowBlur=18; ctx.shadowColor='#CC0000';
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5;
  ctx.strokeRect(bx-px, by-py, bw+px*2, bh+py*2);
  ctx.restore();

  // Corner accents
  ctx.save();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
  const len=18;
  [[bx-px,by-py,bx-px+len,by-py,bx-px,by-py+len],
   [bx+bw+px,by-py,bx+bw+px-len,by-py,bx+bw+px,by-py+len],
   [bx-px,by+bh+py,bx-px+len,by+bh+py,bx-px,by+bh+py-len],
   [bx+bw+px,by+bh+py,bx+bw+px-len,by+bh+py,bx+bw+px,by+bh+py-len]]
  .forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x1,y1); ctx.lineTo(x3,y3); ctx.stroke();
  });
  ctx.restore();

  // TVK badge
  const cx = bx-px + (bw+px*2)/2;
  ctx.fillStyle='rgba(180,0,0,0.88)';
  ctx.fillRect(cx-34, by-py-24, 68, 22);
  ctx.fillStyle='#FFD700'; ctx.font='bold 11px Oswald,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('✦ TVK ✦', cx, by-py-8);
  ctx.textAlign='left';
}

// ═══════════════════════════════════
// START APP
// ═══════════════════════════════════
function startApp() {
  if (appStarted) return;
  appStarted = true;

  // Fade out splash
  const splash = document.getElementById('splash');
  splash.style.opacity = '0';
  setTimeout(() => splash.style.display = 'none', 650);

  // Play TVK song
  const audio = document.getElementById('bgAudio');
  audio.volume = 0.8;
  audio.play()
    .then(()=> showToast('🎵 TVK SONG PLAYING'))
    .catch(e => {
      console.warn('Audio blocked:', e);
      showToast('🔇 TAP AGAIN FOR MUSIC');
      document.body.addEventListener('click', ()=> audio.play(), { once: true });
    });

  // Camera + MediaPipe
  navigator.mediaDevices.getUserMedia({
    video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
    audio: false
  }).then(stream => {
    video.srcObject = stream;
    const mpCam = new Camera(video, {
      onFrame: async () => { await fd.send({ image: video }); },
      width: 640, height: 480
    });
    mpCam.start();
    renderLoop();
  }).catch(() => {
    showToast('CAMERA PERMISSION NEEDED');
    renderLoop(); // still render vijay even without camera
  });
}

// ═══════════════════════════════════
// SLOGAN
// ═══════════════════════════════════
function cycleSloganOverlay() {
  sloganIdx = (sloganIdx + 1) % SLOGANS.length;
  const s = SLOGANS[sloganIdx];
  const el = document.getElementById('sloganOverlay');
  document.getElementById('sloganBig').textContent   = s.en;
  document.getElementById('sloganTamil').textContent = s.ta;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
  if (window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(s.ta);
    u.lang='ta-IN'; u.rate=0.85; u.pitch=1.1;
    const tv = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ta'));
    if (tv) u.voice = tv;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

// ═══════════════════════════════════
// CAPTURE PHOTO
// ═══════════════════════════════════
async function capturePhoto() {
  const fl = document.getElementById('flash');
  fl.classList.add('active');
  setTimeout(() => fl.classList.remove('active'), 150);
  await new Promise(r=>setTimeout(r,80));

  const cc = document.getElementById('captureCanvas');
  const cctx = cc.getContext('2d');
  cc.width = arCanvas.width; cc.height = arCanvas.height;
  cctx.drawImage(arCanvas, 0, 0);
  drawWatermark(cctx, cc.width, cc.height);

  cc.toBlob(blob => {
    lastBlob = blob;
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.download = `TVK_Campaign_${Date.now()}.png`;
    a.href = url; a.click();
    URL.revokeObjectURL(url);
    showToast('📸 PHOTO SAVED!');
  }, 'image/png');
}

function drawWatermark(c, W, H) {
  const g = c.createLinearGradient(0, H-80, 0, H);
  g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(130,0,0,0.80)');
  c.fillStyle=g; c.fillRect(0,H-80,W,80);
  c.font='bold 14px "Bebas Neue",sans-serif';
  c.fillStyle='rgba(255,215,0,0.92)'; c.textAlign='center';
  c.fillText('✦ தமிழக வெற்றிக் கழகம் – TAMILAGA VETTRI KAZHAGAM ✦', W/2, H-18);
  c.textAlign='left';
}

// ═══════════════════════════════════
// VIDEO RECORDING
// ═══════════════════════════════════
let mediaRecorder = null, chunks = [], isRecording = false, audioCtxRec = null;

async function toggleRecording() {
  if (!appStarted) { showToast('PRESS START FIRST'); return; }
  isRecording ? stopRecording() : await startRecording();
}

async function startRecording() {
  chunks = [];

  // Canvas stream at 30fps
  const canvasStream = arCanvas.captureStream(30);

  // Try to capture bgAudio into recording
  try {
    audioCtxRec = new (window.AudioContext || window.webkitAudioContext)();
    const bgAudio = document.getElementById('bgAudio');
    const src  = audioCtxRec.createMediaElementSource(bgAudio);
    const dest = audioCtxRec.createMediaStreamDestination();
    src.connect(dest);
    src.connect(audioCtxRec.destination); // keep speakers on
    const aTrack = dest.stream.getAudioTracks()[0];
    if (aTrack) canvasStream.addTrack(aTrack);
  } catch(e) { console.warn('Audio capture skipped:', e); }

  const mimes = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
    'video/mp4',
  ];
  const mime = mimes.find(m => MediaRecorder.isTypeSupported(m)) || '';

  try {
    mediaRecorder = new MediaRecorder(canvasStream, {
      mimeType: mime || undefined,
      videoBitsPerSecond: 4_000_000
    });
  } catch(e) {
    showToast('⚠ RECORDING NOT SUPPORTED'); return;
  }

  mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = saveVideo;
  mediaRecorder.start(200);
  isRecording = true;

  document.getElementById('recIndicator').classList.add('active');
  document.getElementById('recBtn').classList.add('rec-active');
  document.getElementById('recIcon').textContent  = '⏹';
  document.getElementById('recLabel').textContent = 'STOP';
  showToast('🔴 RECORDING…');
}

function stopRecording() {
  if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  document.getElementById('recIndicator').classList.remove('active');
  document.getElementById('recBtn').classList.remove('rec-active');
  document.getElementById('recIcon').textContent  = '🎥';
  document.getElementById('recLabel').textContent = 'RECORD';
  showToast('⏹ SAVING VIDEO…');
}

function saveVideo() {
  if (!chunks.length) { showToast('⚠ NO VIDEO DATA'); return; }
  const blob = new Blob(chunks, { type: chunks[0].type || 'video/webm' });
  const ext  = blob.type.includes('mp4') ? 'mp4' : 'webm';
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.download = `TVK_Campaign_${Date.now()}.${ext}`;
  a.href = url; a.click();
  URL.revokeObjectURL(url);
  showToast(`🎬 VIDEO SAVED (.${ext})`);
}

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

// iOS audio resume on touch
document.addEventListener('touchstart', () => {
  const a = document.getElementById('bgAudio');
  if (appStarted && a.paused) a.play();
}, { passive: true });
</script>
