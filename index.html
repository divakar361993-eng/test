<!DOCTYPE html>
<html>
<head>
  <title>Vijay AR Selfie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }

    video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    #overlay {
      position:absolute;
      width:200px;
      left:50%;
      bottom:50px;
      transform:translateX(-50%);
      touch-action:none;
    }

    .controls {
      position:absolute;
      bottom:10px;
      width:100%;
      display:flex;
      justify-content:center;
      gap:10px;
    }

    button {
      padding:10px;
      font-size:14px;
      border:none;
      border-radius:8px;
      background:#ffcc00;
    }

    input[type=range] {
      width:120px;
    }
  </style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="overlay" src="vijay.png">

<div class="controls">
  <button onclick="switchCamera()">🔄 Camera</button>
  <input type="range" min="100" max="400" value="200" id="sizeSlider">
  <button onclick="capture()">📸 Capture</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById('camera');
let currentStream;
let useFront = true;

// 📷 Start Camera
function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFront ? "user" : "environment" }
  }).then(stream => {
    currentStream = stream;
    video.srcObject = stream;
  });
}

startCamera();

// 🔄 Switch Camera
function switchCamera() {
  useFront = !useFront;
  startCamera();
}

// 📏 Resize Overlay
const slider = document.getElementById('sizeSlider');
const overlay = document.getElementById('overlay');

slider.oninput = () => {
  overlay.style.width = slider.value + "px";
};

// 🖐️ Drag Feature
let isDragging = false, offsetX, offsetY;

overlay.addEventListener('touchstart', e => {
  isDragging = true;
  offsetX = e.touches[0].clientX - overlay.offsetLeft;
  offsetY = e.touches[0].clientY - overlay.offsetTop;
});

overlay.addEventListener('touchmove', e => {
  if (!isDragging) return;
  overlay.style.left = (e.touches[0].clientX - offsetX) + "px";
  overlay.style.top = (e.touches[0].clientY - offsetY) + "px";
});

overlay.addEventListener('touchend', () => isDragging = false);

// 📸 Capture Image
function capture() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // Draw video
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Draw overlay
  const rect = overlay.getBoundingClientRect();
  const videoRect = video.getBoundingClientRect();

  const x = rect.left - videoRect.left;
  const y = rect.top - videoRect.top;

  ctx.drawImage(overlay, x, y, rect.width, rect.height);

  // Download
  const link = document.createElement('a');
  link.download = "image.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
